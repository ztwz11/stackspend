name: npm-publish-cli

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag"
        required: true
        default: "alpha"
        type: choice
        options:
          - alpha

permissions:
  contents: read

jobs:
  publish:
    name: publish-cli-and-app
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.tmp/npm-cache
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'alpha' }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify npm token is configured
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Missing NPM_TOKEN repository secret." >&2
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: npm run secret:scan:all
      - run: node tools/scripts/run-pnpm.mjs --filter @moneysiren/cli test -- cli.test.ts release-installer.test.ts
      - run: node tools/scripts/run-pnpm.mjs --filter @moneysiren/cli typecheck
      - run: npm run publish:cli:dry-run
      - run: npm run publish:app:dry-run

      - name: Publish CLI to npm
        working-directory: apps/cli
        shell: bash
        run: npm publish --tag "${NPM_DIST_TAG}" --access public

      - name: Publish app installer to npm
        working-directory: apps/app
        shell: bash
        run: npm publish --tag "${NPM_DIST_TAG}" --access public

      - name: Keep app prereleases off latest dist-tag
        if: env.NPM_DIST_TAG != 'latest'
        shell: bash
        run: |
          set -euo pipefail
          npm dist-tag rm @moneysiren/app latest || true
