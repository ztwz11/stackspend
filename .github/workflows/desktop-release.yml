name: desktop-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v0.1.0-alpha.0"
      create_release:
        description: "Create/update the GitHub Release and upload assets"
        required: true
        type: boolean
        default: true
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  web-runtime:
    name: web-runtime
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npm run secret:scan:all
      - run: node tools/scripts/run-pnpm.mjs --filter @moneysiren/web build
      - run: npm run release:web-runtime
      - name: Archive web runtime
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-manual}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
          fi
          safe_tag="${tag//\//-}"
          mkdir -p dist/release
          tar -czf "dist/release/moneysiren-web-runtime-${safe_tag}.tar.gz" -C dist/web-runtime moneysiren-web-runtime
          cd dist/release
          sha256sum moneysiren-web-runtime-*.tar.gz > moneysiren-web-runtime-SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: moneysiren-web-runtime
          path: dist/release/*
          if-no-files-found: error

  desktop:
    name: desktop-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runner: windows-latest
            bundles: nsis
          - name: macos
            runner: macos-latest
            bundles: app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - run: pnpm install --frozen-lockfile
      - run: npm run secret:scan:all
      - run: npm run tray:native:check

      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            throw 'Missing WINDOWS_CERTIFICATE repository secret.'
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw 'Missing WINDOWS_CERTIFICATE_PASSWORD repository secret.'
          }

          New-Item -ItemType Directory -Force .tmp\codesign | Out-Null
          $encodedCertificatePath = '.tmp\codesign\windows-certificate.txt'
          $certificatePath = '.tmp\codesign\windows-certificate.pfx'
          Set-Content -LiteralPath $encodedCertificatePath -Value $env:WINDOWS_CERTIFICATE
          certutil -decode $encodedCertificatePath $certificatePath
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to decode WINDOWS_CERTIFICATE.'
          }
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if ($certificate -is [array]) {
            $certificate = $certificate[0]
          }
          if ($null -eq $certificate -or [string]::IsNullOrWhiteSpace($certificate.Thumbprint)) {
            throw 'Windows signing certificate was imported, but no certificate thumbprint was available.'
          }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Remove-Item -LiteralPath $encodedCertificatePath,$certificatePath -Force

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "Missing APPLE_CERTIFICATE repository secret." >&2
            exit 1
          fi
          if [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing APPLE_CERTIFICATE_PASSWORD repository secret." >&2
            exit 1
          fi
          if [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "Missing KEYCHAIN_PASSWORD repository secret." >&2
            exit 1
          fi

          mkdir -p .tmp/codesign
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > .tmp/codesign/apple-certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import .tmp/codesign/apple-certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/[0-9]+\) [A-Fa-f0-9]+/ { print $2; exit }')"
          if [ -z "$cert_id" ]; then
            echo "No valid Apple code-signing identity was found in the imported keychain." >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
          rm -f .tmp/codesign/apple-certificate.p12

      - name: Prepare Tauri signing config
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVIDER_SHORT_NAME: ${{ vars.APPLE_PROVIDER_SHORT_NAME }}
          WINDOWS_DIGEST_ALGORITHM: ${{ vars.WINDOWS_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
          WINDOWS_TSP: ${{ vars.WINDOWS_TSP }}
        run: node tools/scripts/prepare-tauri-signing-config.mjs --platform ${{ matrix.name }} --out apps/tray/.tmp/tauri-signing-${{ matrix.name }}.json

      - name: Build signed desktop bundle
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVIDER_SHORT_NAME: ${{ vars.APPLE_PROVIDER_SHORT_NAME }}
        run: node tools/scripts/run-pnpm.mjs --filter @moneysiren/tray tauri:build --ci --config .tmp/tauri-signing-${{ matrix.name }}.json --bundles ${{ matrix.bundles }}

      - name: Delete Apple signing keychain
        if: runner.os == 'macOS' && always()
        shell: bash
        run: security delete-keychain build.keychain || true

      - name: Collect Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force dist\desktop-release | Out-Null
          $sourceInstallers = @(Get-ChildItem -LiteralPath apps\tray\src-tauri\target\release\bundle\nsis -Filter *.exe)
          if ($sourceInstallers.Count -eq 0) {
            throw 'No Windows installer was produced by Tauri.'
          }

          foreach ($sourceInstaller in $sourceInstallers) {
            $safeName = $sourceInstaller.Name -replace '\s+', '.'
            Copy-Item -LiteralPath $sourceInstaller.FullName -Destination (Join-Path 'dist\desktop-release' $safeName)
          }

          Get-FileHash dist\desktop-release\*.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content dist\desktop-release\moneysiren-tray-windows-SHA256SUMS.txt

      - name: Verify Windows installer signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installers = @(Get-ChildItem -LiteralPath dist\desktop-release -Filter *.exe)
          if ($installers.Count -eq 0) {
            throw 'No Windows installer was collected for signature verification.'
          }

          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Windows installer signature is not valid for $($installer.Name): $($signature.Status) $($signature.StatusMessage)"
            }
            if ($null -eq $signature.SignerCertificate) {
              throw "Windows installer has no signer certificate: $($installer.Name)"
            }
            if ($signature.SignerCertificate.Thumbprint -ne $env:WINDOWS_CERTIFICATE_THUMBPRINT) {
              throw "Windows installer signer thumbprint does not match the imported release certificate for $($installer.Name)."
            }
          }

          $signatureManifest = @()
          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName
            $signatureManifest += [pscustomobject]@{
              assetName = $installer.Name
              signerThumbprint = $signature.SignerCertificate.Thumbprint
              signerSubject = $signature.SignerCertificate.Subject
              signatureStatus = [string]$signature.Status
            }
          }
          $signatureManifest |
            ConvertTo-Json -Depth 5 |
            Set-Content -LiteralPath dist\desktop-release\moneysiren-tray-windows-SIGNATURE.json

      - name: Collect macOS app archive
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/desktop-release
          app_path="$(find apps/tray/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found." >&2
            exit 1
          fi
          app_name="$(basename "$app_path" .app)"
          safe_app_name="${app_name//[[:space:]]/.}"
          tar -czf "dist/desktop-release/${safe_app_name}-macos-${RUNNER_ARCH}.tar.gz" -C "$(dirname "$app_path")" "$(basename "$app_path")"
          cd dist/desktop-release
          shasum -a 256 *.tar.gz > moneysiren-tray-macos-SHA256SUMS.txt

      - name: Verify macOS app signature and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find apps/tray/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found for signature verification." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl -a -vv -t exec "$app_path"

      - uses: actions/upload-artifact@v4
        with:
          name: moneysiren-desktop-${{ matrix.name }}
          path: dist/desktop-release/*
          if-no-files-found: error

  publish:
    name: publish-release
    needs:
      - web-runtime
      - desktop
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.create_release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prerelease_flag="--prerelease"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG}"
            if [ "${DISPATCH_PRERELEASE}" != "true" ]; then
              prerelease_flag=""
            fi
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release-assets/* --clobber
          else
            gh release create "$tag" dist/release-assets/* \
              --target "$GITHUB_SHA" \
              --title "MoneySiren ${tag}" \
              --notes-file docs/release/desktop-alpha-notes.md \
              $prerelease_flag
          fi
